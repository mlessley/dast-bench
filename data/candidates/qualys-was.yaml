scores:
- criterion_id: api-spa-coverage
  score: 2.5
  evidence: 'REST/SOAP confirmed via Swagger/OpenAPI/Postman/Burp-capture import;
    confirmed weak on GraphQL/gRPC after independent gap-check -- a 2025 QID only
    detects a known CVE in the GraphQL Mesh software component, not query/introspection
    scanning, and third-party comparisons (Beagle Security, Invicti) explicitly state
    Qualys lags on GraphQL/SPA crawling. Source: docs.qualys.com WAS 1.14 release
    notes, beaglesecurity.com Acunetix vs Qualys comparison'
  confidence: paper
  timestamp: '2026-07-18T19:44:09.505767'
- criterion_id: shadow-api-discovery
  score: 4.0
  evidence: 'Revised up after independent gap-check: WAS''s own ''API Security'' module
    (within WAS itself, not a separate EASM/CSAM product) explicitly claims to catalog
    internal, external, undocumented, rogue, and shadow APIs across cloud/container/gateway
    environments. Source: blog.qualys.com API Security in WAS post'
  confidence: paper
  timestamp: '2026-07-18T19:44:09.848750'
- criterion_id: auth-session-handling
  score: 3.5
  evidence: 'TOTP MFA is automatable; other MFA/SSO requires manual session-cookie
    extraction or a Selenium script played back at the browser level (technology-agnostic
    to SAML/OAuth/CAS) -- Qualys itself discloses it cannot automate 2FA/MFA beyond
    TOTP. Source: success.qualys.com discussions on SSO/MFA handling'
  confidence: paper
  timestamp: '2026-07-18T19:44:10.233358'
- criterion_id: detection-accuracy
  score: 3.0
