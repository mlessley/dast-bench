    mapping confirmed, and some of this breadth is platform-wide (Policy Audit) rather
    than WAS-DAST-specific. Source: blog.qualys.com Policy Audit post'
  confidence: paper
  timestamp: '2026-07-18T19:44:15.504275'
- criterion_id: finding-validation-proof-of-exploit
  score: 2.5
  evidence: 'A real product, Qualys TruConfirm (''Agent-Led Safe Exploit Validation''),
    was found during independent gap-check, but its scope (WAS/web-app findings vs.
    VMDR/infrastructure-only) could not be confirmed either way -- flagged as an unresolved
    lead rather than a confirmed WAS capability. TruRisk itself factors exploitability
    into a risk score, which is prioritization, not the same as confirming a specific
    finding is exploitable with proof. Source: qualys.com/apps/truconfirm'
  confidence: paper
  timestamp: '2026-07-18T19:44:15.931230'
- criterion_id: sensitive-financial-data-exposure
  score: 4.5
