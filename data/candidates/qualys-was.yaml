- criterion_id: asset-discovery-inventory
  score: 5.0
  evidence: 'Qualys EASM explicitly probes ''like an attacker would'' -- starting
    from org name and seed domains, expanding via DNS records, SSL/TLS certificate
    transparency logs, WHOIS data, hosting fingerprints, and cloud provider metadata
    -- to map every internet-facing asset including shadow IT and forgotten test servers.
    Directly matches the rubric''s top tier. Source: qualys.com attack surface management
    FAQ'
  confidence: paper
  timestamp: '2026-07-18T19:44:15.104319'
- criterion_id: compliance-standards-mapping
  score: 4.0
