observations:
- context: discovery research
  note: 'Seeded must-include per stakeholder decision. Leading free/open-source DAST
    tool, actively maintained by the OWASP Foundation, scriptable and pipeline-friendly.
    Source: Aikido Security ''Top 13 DAST Tools 2026'' (aikido.dev/blog/top-dynamic-application-security-testing-dast-tools).'
  tags:
  - discovery
  timestamp: '2026-07-12T16:11:11.933975'
- context: dast-scan hands-on results, ground-truth mismatch
  note: 'Real CI run detected only 1/10 Juice Shop and 0/9 VAmPI seeded ground-truth
    vulnerabilities (only match: 10038 CSP-header-not-set). Real findings were almost
    entirely passive/config-level (backup file disclosure, CORS misconfig, missing
    headers, version disclosure) -- NOT the OWASP-Top-10-style vulnerabilities (SQLi,
    XSS, JWT weaknesses) the ground truth was curated around. Root cause: zap-full-scan.py
    runs unauthenticated by default, so it never logs in or navigates the SPA/API
    deeply enough to reach Juice Shop''s deliberately-planted challenge vulnerabilities,
    most of which require authentication or specific interaction. The seeded ground
    truth was curated from ''vulnerabilities ZAP can plausibly detect'' reasoning,
    not validated against an actual unauthenticated CI run -- this is a real methodology
    gap, not a ZAP quality issue.'
  tags:
  - hands-on
  - ground-truth-gap
  timestamp: '2026-07-12T19:23:15.679316'
- context: ground-truth correction
  note: Ground truth rebuilt from real observed output (see benchmarks.yaml commit
    cf4ef05) after confirming authentication didn't change reachability. The 'corrected-ground-truth-*'
    hands-on results supersede the earlier ones ingested against the original aspirational
    ground truth -- those earlier results (1/10, 0/9) reflected an unreachable answer
    key, not real tool performance.
  tags:
  - hands-on
  - ground-truth-gap
  timestamp: '2026-07-12T20:45:48.183029'
