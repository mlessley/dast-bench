  confidence: paper
  timestamp: '2026-07-12T16:15:17.210341'
- criterion_id: shadow-api-discovery
  score: 3.0
  evidence: AJAX Spider + traditional spider do JS-bundle/common-path heuristic discovery;
    no dedicated deprecated/versioned-endpoint detection engine.
  confidence: paper
  timestamp: '2026-07-12T16:15:17.435788'
- criterion_id: auth-session-handling
  score: 3.5
  evidence: Form/script-based auth and HTTP session management are solid; SSO/OAuth/MFA
