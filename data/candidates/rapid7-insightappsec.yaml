observations:
- context: discovery research
  note: 'Added on infra-vendor-bundling logic: a buyer already running Rapid7 for
    infrastructure vulnerability management (InsightVM) may evaluate this as a native-platform
    DAST add rather than a new vendor relationship, which is a common enterprise procurement
    pattern. Universal Translator normalizes React/Angular/Vue traffic for modern
    app testing; Attack Replay generates a locally-executable reproduction package
    per finding; on-prem scan engines support internal-only apps while centralizing
    results in a cloud console. Sources: rapid7.com/products/insightappsec, docs.rapid7.com/insightappsec/quick-start'
  tags:
  - discovery
  - enterprise-pivot
  timestamp: '2026-07-18T16:17:52.176811'
