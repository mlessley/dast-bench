scores:
- criterion_id: api-spa-coverage
  score: 3.5
  evidence: 'REST/SOAP (WSDL upload) and GraphQL (schema parsing + attack template)
    confirmed; one comparative source claims ''limited or no native support for GraphQL
    and gRPC,'' directly conflicting with Rapid7''s own GraphQL docs -- both cited.
    Source: docs.rapid7.com/insightappsec/graphql'
  confidence: paper
  timestamp: '2026-07-18T19:26:51.325418'
- criterion_id: shadow-api-discovery
  score: 2.0
  evidence: 'Confirmed weak after independent gap-check: ''Application Discovery''
    is Project Sonar-powered asset/domain discovery (finds unknown applications/subdomains),
    not undocumented-endpoint discovery within an application already being scanned
    -- a real capability gap, not just unclear documentation. Source: rapid7.com/blog
    Application Discovery post'
  confidence: paper
  timestamp: '2026-07-18T19:26:51.717844'
- criterion_id: auth-session-handling
  score: 4.5
  evidence: 'Automated Login auto-detects login pages and re-authenticates on logout;
    Macro and Selenium recorded scripted login for complex flows; TOTP MFA support;
    logout/session detection via regex. Source: docs.rapid7.com/insightappsec/authentication'
  confidence: paper
  timestamp: '2026-07-18T19:26:52.139416'
- criterion_id: detection-accuracy
  score: 3.0
  evidence: No credible independent benchmark found either direction after gap-check;
    the widely-circulated '94% false positive' figure (see false-positive-rate) is
    not a valid accuracy signal. Scored on general platform claims (signature-based
    detection, Universal Translator for modern frameworks) absent contrary evidence.
  confidence: paper
  timestamp: '2026-07-18T19:26:52.572959'
- criterion_id: false-positive-rate
  score: 3.0
  evidence: 'Correction after independent gap-check: the widely-quoted ''94% false
    positive rate'' traces to a single anonymous PeerSpot reviewer''s subjective comment
    in a room-for-improvement section (re: SQL/JSON injection specifically) -- not
    a benchmark study, not corroborated elsewhere among the other reviews on that
    page or any other source. Reported here as an unverified anecdote, not a real
    statistic. No other strong false-positive evidence found either direction. Source:
    peerspot.com/products/rapid7-insightappsec-reviews'
  confidence: paper
  timestamp: '2026-07-18T19:26:52.982861'
