observations:
- context: discovery research
  note: 'Seeded must-include per stakeholder decision, chosen as the second tool to
    onboard for dast-bench''s own dogfooding exercise. Extremely popular, actively
    maintained open-source template-based scanner (different architecture from crawl-and-attack
    tools like ZAP: signature/template matching against a large community rule library).
    Source: ProjectDiscovery''s own GitHub project (github.com/projectdiscovery/nuclei).'
  tags:
  - discovery
  timestamp: '2026-07-12T16:11:12.360055'
- context: dast-onboard-tool integration research
  note: 'Tier 1 (fully local): official docker image projectdiscovery/nuclei:latest,
    CLI invocation ''docker run projectdiscovery/nuclei:latest -u <target> -jsonl
    -o <output>'', no secrets/API key required. Source: projectdiscovery.io/blog/how-to-run-nuclei-other-projectdiscovery-tools-in-docker'
  tags:
  - onboard-tool
  - integration
  timestamp: '2026-07-12T16:22:16.828005'
- context: dast-scan hands-on results, ground-truth mismatch
  note: Real CI run detected 0/10 Juice Shop and 0/9 VAmPI seeded ground-truth vulnerabilities.
    Real findings were entirely info/low-severity fingerprinting and detection templates
    (tech-detect, swagger-api, robots.txt, security.txt, missing-headers) using Nuclei's
    own template-id namespace, which shares zero overlap with the ZAP-plugin-ID-based
    ground truth -- confirms the cross-tool ID-reconciliation gap flagged during dast-onboard-tool's
    design. Additionally, like ZAP's run, the scan was unauthenticated, so template-based
    CVE/misconfig matching had no path to the app's actual planted vulnerabilities
    either.
  tags:
  - hands-on
  - ground-truth-gap
  - id-reconciliation-gap
  timestamp: '2026-07-12T19:23:15.905736'
- context: ground-truth correction
  note: 'Ground truth rebuilt from real observed output (see benchmarks.yaml commit
    cf4ef05). The ''corrected-ground-truth-*'' hands-on results supersede the earlier
    ones (0/10, 0/9) ingested against the original aspirational ground truth. Also
    note: the false-positive count here is coarse -- it counts every finding not on
    the ground truth list as a false positive, including legitimate info-level fingerprinting
    (tech-detect, robots.txt, etc.) that isn''t really a false alarm, just not itself
    a tracked vulnerability. Nuclei''s high FP count partly reflects this scoring
    coarseness, not necessarily 17 genuinely wrong findings.'
  tags:
  - hands-on
  - ground-truth-gap
  timestamp: '2026-07-12T20:45:48.519412'
