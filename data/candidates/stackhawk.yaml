observations:
- context: discovery research
  note: 'Discovered via live market research for a more realistic three-way comparison.
    Config-as-code (YAML in-repo), native GitHub Actions/CircleCI integration, cloud-backed
    scan execution requiring an API key -- a structurally different deployment tier
    (Tier 2) from ZAP/Nuclei''s fully-local containers. Source: StackHawk ''Top 10
    DAST Tools'' comparison (stackhawk.com/blog/dynamic-application-security-testing-tools-comparison).'
  tags:
  - discovery
  timestamp: '2026-07-12T16:11:12.849869'
- context: dast-shortlist finalist decision
  note: 'Rejected for this round on practical grounds, not merit: highest weighted
    paper score (3.73) but relies on unverified vendor claims for its strongest inputs
    (detection-accuracy, false-positive-rate), two inferred weaknesses (shadow-api-discovery,
    safe-prod-scanning), and is Tier 2 (needs a paid SaaS account/API key not available
    for this dogfood exercise). Worth revisiting if a trial account becomes available.'
  tags:
  - shortlist
  - business-context
  timestamp: '2026-07-12T16:21:49.564877'
