version: 1
criteria:
- id: api-spa-coverage
  category: Coverage
  name: API/SPA Coverage
  description: Detects vulnerabilities across REST APIs, GraphQL, and JavaScript-rendered
    single-page applications, not just traditional server-rendered pages.
  weight: 5.0
  rubric: '1: Only scans traditional server-rendered HTML forms; no JS-rendered SPA
    crawling, no OpenAPI/GraphQL-aware scanning, no WebSocket/HTTP2/gRPC support.
    3: Crawls JS-rendered SPA content with a headless browser and supports REST via
    OpenAPI import, but GraphQL support is absent or minimal, and no coverage of WebSocket/gRPC
    traffic. 5: Full support for JS-rendered SPAs (headless browser crawling), REST
    (OpenAPI/Swagger import), GraphQL (schema-aware introspection and query fuzzing,
    including inferring schema when introspection is disabled), and modern protocols
    (WebSockets, HTTP/2, gRPC) where applicable.'
- id: shadow-api-discovery
  category: Coverage
  name: Shadow/Zombie API Discovery
  description: Finds undocumented, deprecated, or forgotten API endpoints beyond what's
    in a provided spec.
  weight: 4.0
  rubric: '1: Only tests endpoints explicitly provided; no discovery of undocumented
    endpoints. 3: Some heuristic discovery but misses deprecated/versioned endpoints.
    5: Actively discovers undocumented, deprecated, and versioned endpoints via traffic
    analysis, JS bundle parsing, and pattern-based enumeration.'
- id: auth-session-handling
  category: Coverage
  name: Authentication & Session Handling
  description: Navigates login flows and holds authenticated session state through
    a scan.
  weight: 6.0
  rubric: '1: No support for authenticated scanning; every scan is effectively unauthenticated.
    3: Supports basic scripted login (form-based or token-based) but session handling
    breaks on complex flows (MFA, SSO, refresh tokens), and custom scripting is required
    for anything beyond a simple form. 5: Robust support for complex auth flows (SSO/OIDC/SAML
    validated against real enterprise IDPs like Okta/Ping/Azure AD, MFA bypass hooks,
    token refresh, token-chaining across sequential API calls), automated session
    recovery on mid-scan drops, multi-role/matrix scanning to catch privilege escalation
    and BOLA, and scriptless visual macro recording instead of fragile custom scripts.'
- id: detection-accuracy
  category: Detection Quality
  name: Detection Accuracy
  description: True-positive rate against known benchmarks.
  weight: 7.0
  rubric: '1: Detects only a small fraction of known vulnerabilities, well below OWASP
    Top 10 baseline coverage. 3: Detects most common vulnerability classes reliably
    but misses nuanced/logic-based vulnerabilities. 5: High detection rate across
    both common and nuanced vulnerability classes, validated against known ground
    truth.'
- id: false-positive-rate
  category: Detection Quality
  name: Noise / False-Positive Rate
  description: How much triage overhead the findings create.
  weight: 4.0
  rubric: '1: High false-positive rate requiring extensive manual triage. 3: Moderate
    false-positive rate; manageable triage. 5: Low false-positive rate; findings consistently
    actionable with minimal triage.'
- id: safe-prod-scanning
  category: Production Safety & Operability
  name: Safe Production Scanning
  description: Passive/non-destructive scan modes, rate limiting, low instrumentation
    overhead.
  weight: 6.0
  rubric: '1: No passive-only mode; active scans risk disrupting a live system. 3:
    Offers a passive/safe mode but with limited configurability. 5: Robust passive/non-destructive
    scanning mode with configurable rate limiting suitable for a real production system.'
- id: cicd-native-fit
  category: Production Safety & Operability
  name: CI/CD-Native Fit
  description: Drivable headlessly via CLI/API, not just GUI.
  weight: 5.0
  rubric: '1: GUI-only; no meaningful CLI/API to drive scans headlessly. 3: CLI/API
    exists but requires significant scripting/glue code to integrate into a pipeline
    (inconsistent output formats, unclear exit codes, no native pass/fail build gating).
    5: First-class CLI/API designed for CI/CD use -- clear exit codes that distinguish
    findings-over-threshold from a failed run, native pass/fail policy gates by severity,
    containerized/Kubernetes-native scan runners, consistent machine-readable output,
    and full API parity with anything available in the UI.'
- id: triage-remediation-guidance
  category: Developer Experience
  name: Triage & Remediation Guidance
  description: Explains how to fix a finding, not just what's wrong.
  weight: 4.0
  rubric: '1: Findings list vulnerability names only, with no guidance on how to fix
    them. 3: Findings include general remediation advice but not tailored to the specific
    instance/tech stack. 5: Findings include specific, actionable remediation guidance
    tailored to the detected instance and tech stack, including code-snippet-level
    fixes and links to CWE/OWASP documentation.'
- id: auto-remediation-pr
  category: Developer Experience
  name: Auto-Remediation / Auto-PR
  description: Can automatically propose or open a fix for a detected finding.
  weight: 0.0
  rubric: '1: No auto-remediation capability. 3: Can suggest a fix diff but can''t
    open a PR automatically. 5: Can automatically open a pull request with a proposed
    fix for at least some finding classes.'
- id: setup-onboarding-friction
  category: Developer Experience
  name: Setup & Onboarding Friction
  description: Time/complexity to get a first useful scan running.
  weight: 3.0
  rubric: "1: Significant setup complexity \u2014 hours/tickets needed. 3: Moderate\
    \ setup; first scan achievable within an hour with docs. 5: Minimal setup; first\
    \ useful scan achievable within minutes, sensible defaults."
- id: reporting-exportability
  category: Reporting & Extensibility
  name: Reporting Quality / Exportability
  description: Report clarity and integration with common tools.
  weight: 2.0
  rubric: '1: Reports are hard to read/export; no integration with common tools. 3:
    Clear reports with basic export (PDF/CSV) but no direct integrations. 5: Clear,
    exportable reports with direct integrations into common tools (Jira, Slack, CI
    dashboards), including custom white-label branding for external auditors or clients.'
- id: extensibility-custom-rules
  category: Reporting & Extensibility
  name: Extensibility / Custom Rules
  description: Ability to add custom detection rules or policies.
  weight: 1.0
  rubric: '1: No way to add custom detection rules. 3: Some support but limited/awkward.
    5: Well-documented, straightforward way to add custom detection rules/policies
    without vendor involvement.'
- id: business-logic-workflow-detection
  category: Coverage
  name: Business Logic & Workflow Vulnerability Detection
  description: Detects multi-step, sequence-dependent, and authorization-state-aware
    vulnerabilities (e.g. BOLA via role-based testing) beyond generic parameter fuzzing.
  weight: 4.0
  rubric: '1: Only tests individual endpoints/parameters in isolation; no multi-step
    or business-logic-aware testing. 3: Some multi-step workflow testing (e.g. basic
    BOLA checks via a second test account) but limited to common patterns. 5: Purpose-built
    business-logic testing -- multi-step workflow sequences, authorization-state tracking
    across roles, and sequence-dependent attack chains -- beyond generic parameter
    fuzzing.'
- id: legacy-app-protocol-support
  category: Coverage
  name: Legacy Application & Protocol Support
  description: Active and passive scanning coverage for older web technologies (ASP.NET
    WebForms, JSP, SOAP-heavy services) alongside modern stacks.
  weight: 5.0
  rubric: '1: Assumes a modern stack; no meaningful support for older frameworks (ASP.NET
    WebForms, JSP, SOAP-heavy legacy services) or mainframe-fronting web gateways.
    3: Can crawl and passively scan legacy tech but active-scan coverage and accuracy
    drop noticeably compared to modern stacks. 5: Full active and passive scanning
    parity across legacy and modern stacks alike, including SOAP-heavy internal services.'
- id: third-party-partner-api-risk
  category: Coverage
  name: Third-Party/Partner API Risk Assessment
  description: Scanning partner-facing/open-banking integration endpoints and producing
    vendor-risk-assessment-friendly output.
  weight: 1.0
  rubric: '1: No concept of scanning or flagging partner/third-party-facing integration
    points differently from internal endpoints. 3: Can scan partner-facing APIs the
    same as any other endpoint, but findings aren''t organized in a vendor-risk-assessment-friendly
    way. 5: Explicitly supports scanning open-banking/partner-integration endpoints
    and can produce output organized for a third-party risk management program.'
- id: asset-discovery-inventory
  category: Coverage
  name: Asset Discovery & Inventory Tracking
  description: Discovering unmapped or rogue internet-facing company applications
    beyond a manually-provided target list.
  weight: 1.0
  rubric: '1: No capability to discover apps/assets beyond a manually-provided target
    list. 3: Can discover some additional assets via basic domain/subdomain enumeration.
    5: Actively scans public IP ranges/domains to surface rogue or unmapped internet-facing
    company applications, feeding a live asset inventory.'
- id: compliance-standards-mapping
  category: Detection Quality
  name: Compliance & Standards Mapping
  description: Mapping findings to recognized vulnerability and regulatory compliance
    frameworks.
  weight: 4.0
  rubric: '1: Findings have no mapping to any standard taxonomy. 3: Maps findings
    to OWASP Top 10 only. 5: Maps findings to OWASP Top 10, OWASP API Security Top
    10, CWE, and CVE where applicable, plus regulatory-relevant frameworks for financial
    services (PCI-DSS, GLBA, SOX IT general controls, FFIEC guidance, NYDFS 23 NYCRR
    500) out of the box.'
- id: finding-validation-proof-of-exploit
  category: Detection Quality
  name: Finding Validation / Proof-of-Exploit
  description: Confirming actual exploitability of findings with verifiable evidence,
    reducing manual triage.
  weight: 2.0
  rubric: '1: Every finding is a raw pattern match with no confirmation of actual
    exploitability. 3: Some findings include ad hoc confirmation (e.g. a reflected
    payload echoed back) but not systematic. 5: Systematically validates/confirms
    exploitability with non-destructive proof (e.g. actual response payload) for most
    finding classes, meaningfully reducing manual triage.'
- id: sensitive-financial-data-exposure
  category: Detection Quality
  name: Sensitive Financial Data Exposure Detection
  description: Pattern-specific detection of financial data types (account/routing
    numbers, card PANs, SSNs) in responses.
  weight: 2.0
  rubric: '1: No pattern-specific detection for financial data types; only generic
    PII disclosure, if any. 3: Detects some financial data patterns (e.g. SSNs) but
    not comprehensively (misses account/routing numbers or card PANs). 5: Dedicated,
    accurate pattern detection for account numbers, routing numbers, card PANs, and
    SSNs in responses, distinct from generic PII disclosure.'
- id: scan-performance-scalability
  category: Production Safety & Operability
  name: Scan Performance & Scalability
  description: Scan speed and ability to run concurrently across many applications/targets.
  weight: 2.0
  rubric: '1: Scans are slow and can''t run concurrently across multiple apps/targets.
    3: Reasonable single-scan performance but limited concurrency/parallelism across
    many apps. 5: Fast scans with genuine horizontal scalability across many apps/targets
    simultaneously.'
- id: incremental-differential-scanning
  category: Production Safety & Operability
  name: Incremental / Differential Scanning
  description: Ability to scan only newly changed code or endpoints rather than a
    full rescan every time.
  weight: 0.0
  rubric: '1: Every scan is a full rescan of the entire app regardless of what changed.
    3: Some support for manually scoping a scan to specific paths/endpoints. 5: Automatically
    detects and scans only what changed since the last scan.'
- id: ide-local-dev-tooling
  category: Developer Experience
  name: IDE / Local Developer Tooling
  description: Local CLI or native IDE/pre-commit integration for developer-side feedback
    before CI.
  weight: 1.0
  rubric: '1: No local/IDE integration; only runs centrally (CI or SaaS). 3: A CLI
    tool developers can run locally, but no IDE plugin. 5: Native IDE plugin or pre-commit/pre-push
    local feedback loop.'
- id: ticketing-collaboration-integration
  category: Reporting & Extensibility
  name: Ticketing & Collaboration Integration
  description: Direct, bidirectional integration with ticketing (Jira, ServiceNow)
    and chat (Slack/Teams) tools.
  weight: 2.0
  rubric: '1: No direct integration; findings must be manually copied elsewhere. 3:
    One-way export/webhook to a ticketing tool. 5: Direct, bidirectional integration
    with common ticketing tools (Jira, ServiceNow) and chat (Slack/Teams), including
    automatically closing a ticket when a re-scan confirms the fix.'
- id: siem-soar-integration
  category: Reporting & Extensibility
  name: SIEM/SOAR Integration
  description: Native, documented integration with common SIEM/SOAR security operations
    platforms.
  weight: 1.0
  rubric: '1: No structured export suitable for a SIEM/SOAR pipeline. 3: Exports in
    a common format (CEF/syslog) but needs custom parsing. 5: Native, documented integration
    with common SIEM/SOAR platforms.'
- id: historical-risk-trend-dashboards
  category: Reporting & Extensibility
  name: Historical Risk Trend Dashboards
  description: Executive-level dashboards showing remediation velocity and risk-reduction
    trends over time.
  weight: 2.0
  rubric: '1: No historical view; each scan''s results stand alone. 3: Some trend
    data available but not presented as an executive-level view. 5: Executive-level
    dashboards showing remediation velocity, risk-reduction curves, and SLA tracking
    across quarters.'
- id: vulnerability-status-management
  category: Reporting & Extensibility
  name: Vulnerability Status Management
  description: Native workflows for exception management, risk-acceptance tracking,
    false-positive tagging, and audit trail logging.
  weight: 4.0
  rubric: '1: No workflow for managing a finding''s lifecycle; findings are just a
    static list. 3: Basic status marking (open/closed) but no formal exception or
    risk-acceptance workflow. 5: Native workflows for exception management, risk-acceptance
    tracking, false-positive tagging, and a full audit trail of who did what.'
- id: deployment-model-data-residency
  category: Deployment & Data Governance
  name: Deployment Model & Data Residency
  description: Flexibility of deployment topology (on-prem/SaaS/hybrid/air-gapped)
    and configurable control over where scan data is processed and stored.
  weight: 5.0
  rubric: '1: Single fixed deployment model with no visibility into where scan data/traffic
    is processed or stored. 3: Offers more than one deployment model (e.g. SaaS +
    on-prem) but data residency isn''t configurable. 5: Flexible deployment (on-prem,
    SaaS, hybrid with on-prem/VPC scan agents behind the firewall, or fully air-gapped)
    with clear, configurable control over where scan data lives, plus static IP ranges/proxy
    tunneling for safely traversing perimeter defenses.'
- id: multi-tenancy-access-control
  category: Deployment & Data Governance
  name: Multi-Tenancy & Access Control
  description: Role-based access control, audit logging, and business-unit/asset-portfolio
    isolation within the tool itself.
  weight: 3.0
  rubric: '1: No role-based access control; every user has the same permissions. 3:
    Basic roles (admin/user) but no fine-grained permissions or audit log. 5: Fine-grained
    RBAC segregating Global Admins, Security Engineers, and Developers, plus an audit
    log of who did what, with support for business-unit/asset-portfolio isolation.'
- id: vendor-security-posture
  category: Deployment & Data Governance
  name: Vendor Security Posture
  description: Whether the vendor publishes independently verifiable evidence of their
    own security posture (SOC 2, ISO 27001, penetration test results).
  weight: 3.0
  rubric: '1: No visibility into the vendor''s own security posture. 3: Vendor claims
    certifications but doesn''t make reports available for review. 5: Vendor publishes
    a current SOC 2 Type II report, ISO 27001 certification, and a recent third-party
    penetration test summary.'
- id: stateful-web-crawling
  category: Coverage
  name: Traditional Stateful Web Crawling
  description: Multi-page, session-stateful form-handling crawling depth -- navigating
    classic server-rendered multi-step forms, wizards, and dependent-field flows,
    distinct from SPA/API-focused coverage.
  weight: 3.0
  rubric: '1: Crawler treats each page/form independently; loses session/cookie continuity
    across multi-step flows, can''t follow wizard-style navigation or dependent form
    fields. 3: Maintains session state across a multi-step flow and can complete simple
    multi-page forms, but struggles with deeply nested wizards or fields whose valid
    values depend on earlier steps. 5: Robust stateful crawling engine that reliably
    completes complex multi-step, multi-page workflows (shopping-cart-style flows,
    wizards with conditional branching, dependent field values) end to end, maintaining
    session continuity throughout.'
- id: automated-triage-fp-reduction
  category: Detection Quality
  name: Automated Triage / FP-Reduction Engine
  description: Whether the tool has a learning/automation capability (historical pattern
    learning across scans, automated proof-of-concept payload generation/replay) that
    suppresses false positives over time, distinct from a single scan's static false-positive
    rate.
  weight: 3.0
  rubric: '1: No triage automation; every scan''s findings must be manually re-triaged
    from scratch with no memory of prior decisions. 3: Some automation exists (e.g.
    suppressing previously-dismissed findings on re-scan) but no active proof-of-exploit
    generation or cross-scan learning to reduce net-new noise. 5: Active automated-triage
    engine -- generates/replays proof-of-concept payloads to auto-confirm exploitability
    and/or learns from historical triage decisions across scans to measurably reduce
    false positives over time without manual re-review.'
- id: aspm-integration
  category: Reporting & Extensibility
  name: ASPM Integration
  description: Native orchestration hooks into enterprise Application Security Posture
    Management platforms (e.g. ArmorCode, DefectDojo, Snyk AppRisk) for cross-scanner
    risk aggregation and prioritization.
  weight: 2.0
  rubric: '1: No API/webhook surface suitable for ASPM ingestion; findings can only
    be manually exported. 3: Findings can be exported in a format an ASPM platform
    can ingest (e.g. SARIF, generic JSON) via manual/scripted integration, but no
    native/documented ASPM connector. 5: Native, documented integration with at least
    one major ASPM platform (e.g. ArmorCode, DefectDojo, Snyk AppRisk) -- findings
    flow automatically with metadata (asset, owner, risk score) preserved for cross-scanner
    prioritization.'
- id: licensing-model-predictability
  category: Deployment & Data Governance
  name: Predictability of Licensing Model
  description: How well a vendor's commercial pricing model scales predictably with
    actual technical footprint (per-user, per-target-asset, or flat-rate) for multi-year
    enterprise budget planning.
  weight: 3.0
  rubric: '1: Licensing model is opaque or scales unpredictably (e.g. hidden usage
    tiers, frequent renegotiation required, cost scales in a way disconnected from
    actual usage), making multi-year budgeting difficult. 3: Licensing model is documented
    and scales along one clear axis (e.g. per-seat or per-target), but with some friction
    points (step-function pricing jumps, ambiguous asset-counting rules) that complicate
    precise forecasting. 5: Licensing model is transparent, documented, and scales
    smoothly and predictably with actual technical footprint (clear per-user/per-target/flat-rate
    terms, no hidden tiers), enabling confident multi-year budget forecasting.'
